spring:
  r2dbc:
    url: r2dbc:h2:mem:///f2cg;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: always

jwt:
  secret: change-me-in-production-must-be-at-least-32-chars
  expiration-ms: 86400000  # 24h

cors:
  allowed-origin: http://localhost:3000